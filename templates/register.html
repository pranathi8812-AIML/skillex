{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fa-solid fa-user-plus"></i>
      <h2>Create Account</h2>
      <p>Join your neighbourhood skill network</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter your full name" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a password" required/>
      </div>
      <div class="form-group">
        <label>Your Ward / Area</label>
        <input type="text" name="ward" placeholder="e.g. Banjara Hills, Hyderabad" required/>
      </div>
      <button type="submit" class="btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
  </div>
</section>
{% endblock %}
